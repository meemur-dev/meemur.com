<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>meemur — Coming Soon</title>
    <meta
      name="description"
      content="meemur is a digital agency that elevates your entire web presence — from design and performance to analytics and growth. Something great is on the way."
    />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Brand typeface: self-hosted Montserrat (Latin subset). Preload the
         weights used above the fold so the hero text paints without a swap. -->
    <link rel="preload" href="/fonts/montserrat-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/montserrat-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/montserrat-600.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Open Graph / social preview -->
    <meta property="og:title" content="meemur — Coming Soon" />
    <meta
      property="og:description"
      content="A digital agency that elevates your entire web presence. Launching soon."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://meemur.com" />

    <meta name="theme-color" content="#00a9b8" />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Animated background: drifting gradient blobs + tech grid overlay -->
    <div class="bg" aria-hidden="true">
      <span class="blob blob--1"></span>
      <span class="blob blob--2"></span>
      <span class="blob blob--3"></span>
    </div>

    <main class="stage">
      <img
        class="logo"
        src="/logo.svg"
        alt="meemur"
        width="350"
        height="200"
        fetchpriority="high"
      />

      <p class="slogan">We make the web work for you.</p>

      <h1 class="headline">Something great is on the way.</h1>

      <p class="tagline">
        A digital agency that elevates your entire web presence — from design
        and performance to analytics and growth. Our new site is in the build.
      </p>
    </main>

    <footer class="footer">
      <small>&copy; <span id="year">2026</span> meemur</small>
    </footer>

    <script>
      // Keep the copyright year current without a build step.
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
